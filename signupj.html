<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <style>
        /* General reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #092635;
            margin: 0;
            padding: 0;
            color: #333;
        }

        /* Navbar styling */
        .navbar {
            background-color: #fff;
            padding: 10px 20px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
        }

        .navbar ul {
            list-style-type: none;
            display: flex;
            justify-content: space-between;
        }

        .navbar ul li {
            display: inline;
        }

        .navbar a {
            text-decoration: none;
            color: #092635;
            padding: 15px;
            transition: background-color 0.3s ease;
        }

        .navbar .title {
            font-size: 1.8em;
            color: #0d3b4a;
            font-weight: bold;
        }

        .navbar a:hover {
            background-color: #e3e3e3;
            border-radius: 5px;
        }

        /* Banner section */
        .banner {
            background-color: #092635;
            padding: 40px 0;
            text-align: center;
        }

        .banner h3 {
            font-size: 36px;
            color: white;
            margin-bottom: 20px;
        }

        /* Signup form styling */
        .signup {
            max-width: 400px;
            margin: 0 auto;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            padding: 40px;
        }

        h3 {
            margin-top: 0;
            color: #092635;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        label {
            color: #555;
            font-size: 16px;
            font-weight: bold;
        }

        .input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            background-color: #f5f5f5;
            transition: background-color 0.3s ease;
        }

        .input:focus {
            outline: none;
            background-color: #e0e0e0;
        }

        button {
            width: 100%;
            background-color: #092635;
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: rgb(25, 59, 95);
        }

        a {
            color: #0e3447;
            text-decoration: none;
            font-size: 14px;
            display: inline-block;
            margin-top: 10px;
            transition: color 0.3s ease;
        }

        a:hover {
            color: #0056b3;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .navbar ul {
                flex-direction: column;
                align-items: center;
            }

            .signup {
                padding: 30px;
                margin: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <ul>
            <li><a class="title" href="first.html"><b>HustleHub</b></a></li>
            <li><a href="jobs.html">Browse Jobs</a></li>
            <li><a href="user.html">Users</a></li>
            <li><a href="pages.html">Pages</a></li>
            <li><a href="signin.html" style="margin-left: 540px;">Signin</a></li>
            <li><a href="signup.html">Signup</a></li>
            <li><a href="profile.html">Profile</a></li>
        </ul>
    </div>

    <div class="banner">
        <h3>Join HustleHub Today</h3>
        <div class="signup">
            <form action="/signupj" method="POST">
                <h3>Sign Up</h3>
                <label for="username">Name</label><br>
                <input type="text" placeholder="Enter Name" class="input" name="name" required><br>
                <label for="email">Email</label><br>
                <input type="email" placeholder="Enter Email" class="input" name="email" required><br>
                <label for="password">Password</label><br>
                <input type="password" placeholder="Enter Password" class="input" name="password" required><br>
                <button type="submit">Sign Up</button>
                <a href="signin.html" style="float: right;">Already have an account? Signin</a>
            </form>
        </div>
    </div>
</body>
</html>
