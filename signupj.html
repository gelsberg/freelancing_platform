<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Signup — HustleHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #070d1a;
            --card: #111b30;
            --field: #0b1322;
            --line: rgba(148, 163, 184, 0.14);
            --line-strong: rgba(148, 163, 184, 0.28);
            --ink: #e8eef8;
            --muted: #92a4c0;
            --teal: #2dd4bf;
            --grad: linear-gradient(135deg, #2dd4bf, #38bdf8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 6vw;
            background: rgba(7, 13, 26, 0.72);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--line);
        }

        .brand {
            font-size: 1.35rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            text-decoration: none;
            color: var(--ink);
        }

        .brand span {
            background: var(--grad);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links { display: flex; align-items: center; gap: 6px; list-style: none; }

        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.92rem;
            font-weight: 600;
            padding: 8px 14px;
            border-radius: 10px;
            transition: color 0.2s, background 0.2s;
        }

        .nav-links a:hover { color: var(--ink); background: rgba(148, 163, 184, 0.1); }

        main {
            flex: 1;
            display: grid;
            place-items: center;
            padding: 50px 6vw;
            position: relative;
            overflow: hidden;
        }

        main::before {
            content: '';
            position: absolute;
            width: 520px; height: 520px;
            border-radius: 50%;
            background: #115e59;
            filter: blur(130px);
            opacity: 0.28;
            bottom: -180px; right: -140px;
            pointer-events: none;
        }

        .panel {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 40px 36px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.45);
        }

        .panel-head { text-align: center; margin-bottom: 30px; }

        .panel-head .badge {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--teal);
            border: 1px solid rgba(45, 212, 191, 0.35);
            background: rgba(45, 212, 191, 0.08);
            padding: 6px 14px;
            border-radius: 999px;
            margin-bottom: 14px;
        }

        .panel-head h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.02em; }

        .panel-head p { color: var(--muted); margin-top: 6px; font-size: 0.92rem; }

        .field { margin-bottom: 18px; }

        label {
            display: block;
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--muted);
            margin-bottom: 7px;
            letter-spacing: 0.02em;
        }

        input {
            width: 100%;
            font: inherit;
            font-size: 0.95rem;
            color: var(--ink);
            background: var(--field);
            border: 1px solid var(--line-strong);
            border-radius: 12px;
            padding: 12px 15px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input::placeholder { color: #526074; }

        input:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.18);
        }

        button {
            width: 100%;
            border: none;
            cursor: pointer;
            font: inherit;
            font-weight: 800;
            font-size: 1rem;
            color: #06202b;
            background: var(--grad);
            padding: 14px;
            border-radius: 12px;
            margin-top: 6px;
            transition: filter 0.2s, transform 0.15s;
            box-shadow: 0 8px 26px rgba(45, 212, 191, 0.3);
        }

        button:hover { filter: brightness(1.08); }
        button:active { transform: scale(0.99); }

        .alt {
            text-align: center;
            color: var(--muted);
            font-size: 0.88rem;
            margin-top: 20px;
        }

        .alt a { color: var(--teal); font-weight: 600; text-decoration: none; }
        .alt a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a class="brand" href="first.html">Hustle<span>Hub</span></a>
        <ul class="nav-links">
            <li><a href="first.html">Home</a></li>
            <li><a href="signup.html">Account type</a></li>
            <li><a href="signin.html">Sign in</a></li>
        </ul>
    </nav>

    <main>
        <div class="panel">
            <div class="panel-head">
                <span class="badge">Client account</span>
                <h1>Hire great talent, fast</h1>
                <p>Create your account to start posting projects.</p>
            </div>

            <form action="/signupj" method="POST">
                <div class="field">
                    <label for="fullname">Full name</label>
                    <input type="text" id="fullname" name="fullname" placeholder="Jane Doe" required>
                </div>
                <div class="field">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" minlength="6" required>
                </div>
                <button type="submit">Create client account</button>
            </form>

            <p class="alt">Already have an account? <a href="signin.html">Sign in</a><br>Want to work instead? <a href="signupf.html">Freelancer signup</a></p>
        </div>
    </main>

</body>
</html>
