<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelancer Signup</title>
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d3b4a;
            color: #fff;
            margin: 0;
        }

        .navbar {
            background-color: #fff;
            padding: 10px 20px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
        }

        .navbar ul {
            list-style-type: none;
            display: flex;
            justify-content: space-between;
        }

        .navbar ul li {
            display: inline;
        }

        .navbar a {
            text-decoration: none;
            color: #092635;
            padding: 15px;
            transition: background-color 0.3s ease;
        }

        .navbar .title {
            font-size: 1.8em;
            color: #0d3b4a;
            font-weight: bold;
        }

        .navbar a:hover {
            background-color: #e3e3e3;
            border-radius: 5px;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.15);
            padding: 30px;
        }

        .header {
            text-align: center;
            background-color: #17455c;
            padding: 20px;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
        }

        .header h1 {
            color: #fff;
            font-size: 2.2em;
            margin: 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="number"],
        textarea {
            width: calc(100% - 20px);
            padding: 10px;
            border: none;
            border-radius: 5px;
            background-color: #f0f0f0;
        }

        textarea {
            resize: vertical;
        }

        button[type="submit"] {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 5px;
            background-color: #17455c;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button[type="submit"]:hover {
            background-color: #0d3b4a;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .navbar ul {
                flex-direction: column;
                align-items: center;
            }

            .container {
                margin: 20px auto;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <ul>
            <li><a class="title" href="first.html"><b>HustleHub</b></a></li>
            <li><a href="jobs.html">Browse Jobs</a></li>
            <li><a href="user.html">Users</a></li>
            <li><a href="pages.html">Pages</a></li>
            <li><a href="signin.html">Signin</a></li>
            <li><a href="signup.html">Signup</a></li>
            <li><a href="profile.html">Profile</a></li>
        </ul>
    </div>

    <div class="container">
        <div class="header">
            <h1>Freelancer Signup</h1>
        </div>
        <div class="content">
            <form action="signupf.php" method="POST">
                <div class="form-group">
                    <label for="fullname">Full Name:</label>
                    <input type="text" id="fullname" name="fullname" required>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password:</label>
                    <input type="password" id="confirm_password" name="confirm_password" required>
                </div>
                <div class="form-group">
                    <label for="skills">Skills:</label>
                    <input type="text" id="skills" name="skills">
                </div>
                <div class="form-group">
                    <label for="experience">Experience (years):</label>
                    <input type="number" id="experience" name="experience" min="0">
                </div>
                <div class="form-group">
                    <label for="location">Location:</label>
                    <input type="text" id="location" name="location">
                </div>
                <div class="form-group">
                    <label for="hourly_rate">Hourly Rate ($):</label>
                    <input type="number" id="hourly_rate" name="hourly_rate" min="0">
                </div>
                <div class="form-group">
                    <label for="description">Description:</label>
                    <textarea id="description" name="description" rows="4"></textarea>
                </div>
                <div class="form-group">
                    <button type="submit">Sign Up</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
